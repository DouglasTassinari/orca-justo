<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orça Justo — Calculadora de orçamento para prestadores</title>
  <meta name="description" content="Descubra quanto você realmente ganha por dia antes de fechar o orçamento." />

  <!-- Tailwind (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + Babel (CDN, sem build) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { color-scheme: light; }
    body { -webkit-text-size-adjust: 100%; }
    /* Esconde as setas de input number no mobile pra ficar mais limpo */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    @media print {
      .no-print { display: none !important; }
      body { background: #fff !important; }
      .print-area { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
      .print-only { display: block !important; }
      @page { margin: 14mm; }
    }
    .print-only { display: none; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>

  <!-- O JSX abaixo NÃO é executado direto pelo navegador: é transformado pelo
       bootstrap no final do body, usando o runtime clássico (React.createElement). -->
  <script type="text/plain" id="app-src">
    const { useState, useMemo, useEffect } = React;

    /* Multiplicadores de complexidade aplicados ao rendimento que o usuário informa.
       Baixa rende mais (menos dias) · Média sem ajuste · Alta rende menos (mais dias). */
    const FATOR_COMPLEXIDADE = { "Baixa": 1.15, "Média": 1.0, "Alta": 0.8 };
    const UNIDADES = ["m²", "m", "unidade", "serviço"];
    const COMPLEXIDADES = ["Baixa", "Média", "Alta"];

    /* ===================== HELPERS ===================== */
    const brl = (n) => (isFinite(n) ? n : 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    const dec = (n, d = 1) => (isFinite(n) ? n : 0).toLocaleString("pt-BR", { minimumFractionDigits: 0, maximumFractionDigits: d });
    const toNum = (v) => { const n = parseFloat(String(v).replace(",", ".")); return isFinite(n) ? n : 0; };
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

    /* Calcula dias úteis de um item (serviço ou aditivo) com base no rendimento
       informado pelo usuário e no fator de complexidade. */
    function diasDoItem(item) {
      const rend = toNum(item.rendimento);
      const fator = FATOR_COMPLEXIDADE[item.complexidade] || 1;
      const rendEfetivo = rend * fator;
      const qtd = toNum(item.quantidade);
      const dias = rendEfetivo > 0 ? qtd / rendEfetivo : 0;
      return { dias, rendEfetivo, rend };
    }

    /* ===================== UI BÁSICA ===================== */
    function Campo({ label, hint, children }) {
      return (
        <label className="block">
          <span className="block text-sm font-medium text-slate-700">{label}</span>
          {hint && <span className="block text-xs text-slate-400 mb-1">{hint}</span>}
          <div className={hint ? "" : "mt-1"}>{children}</div>
        </label>
      );
    }
    const inputCls = "w-full rounded-lg border border-slate-300 px-3 py-2.5 text-base focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none";

    function NumInput({ value, onChange, prefix, suffix, placeholder }) {
      return (
        <div className="relative">
          {prefix && <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">{prefix}</span>}
          <input
            type="number" inputMode="decimal" value={value} placeholder={placeholder}
            onChange={(e) => onChange(e.target.value)}
            className={inputCls + (prefix ? " pl-9" : "") + (suffix ? " pr-12" : "")}
          />
          {suffix && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">{suffix}</span>}
        </div>
      );
    }

    function LinhaResumo({ titulo, valor, sub, destaque }) {
      return (
        <div className={"flex items-baseline justify-between gap-3 py-1.5 " + (destaque ? "" : "border-b border-slate-100 last:border-0")}>
          <div>
            <div className={destaque ? "font-semibold" : "text-slate-600"}>{titulo}</div>
            {sub && <div className="text-xs text-slate-400">{sub}</div>}
          </div>
          <div className={"tabular-nums " + (destaque ? "font-bold text-lg" : "font-medium text-slate-700")}>{valor}</div>
        </div>
      );
    }

    /* ===================== APP ===================== */
    const ESTADO_INICIAL = {
      prof: {
        ganhoDia: "", diasSemana: "", possuiAjudante: false,
        custoAjudanteDia: "", deslocamentoDia: "", margem: "",
      },
      servicos: [
        // Começa com uma linha vazia pronta pra preencher
        { id: uid(), nome: "", unidade: "m²", quantidade: "", rendimento: "", complexidade: "Média" },
      ],
      aditivos: [],
      contratoOriginal: "",
      simuladorPreco: "",
    };

    function App() {
      const [prof, setProf] = useState(ESTADO_INICIAL.prof);
      const [servicos, setServicos] = useState(ESTADO_INICIAL.servicos);
      const [aditivos, setAditivos] = useState(ESTADO_INICIAL.aditivos);
      const [contratoOriginal, setContratoOriginal] = useState(ESTADO_INICIAL.contratoOriginal);
      const [simuladorPreco, setSimuladorPreco] = useState(ESTADO_INICIAL.simuladorPreco);
      const [mostrarAditivos, setMostrarAditivos] = useState(false);
      const [carregado, setCarregado] = useState(false);

      /* Persistência local (sem banco de dados) */
      useEffect(() => {
        try {
          const s = localStorage.getItem("orcajusto_v2");
          if (s) {
            const d = JSON.parse(s);
            if (d.prof) setProf(d.prof);
            if (d.servicos) setServicos(d.servicos);
            if (d.aditivos) setAditivos(d.aditivos);
            if (d.contratoOriginal != null) setContratoOriginal(d.contratoOriginal);
            if (d.mostrarAditivos != null) setMostrarAditivos(d.mostrarAditivos);
          }
        } catch (e) {}
        setCarregado(true);
      }, []);
      useEffect(() => {
        if (!carregado) return;
        try {
          localStorage.setItem("orcajusto_v2", JSON.stringify({ prof, servicos, aditivos, contratoOriginal, mostrarAditivos }));
        } catch (e) {}
      }, [prof, servicos, aditivos, contratoOriginal, mostrarAditivos, carregado]);

      const setP = (k, v) => setProf((p) => ({ ...p, [k]: v }));

      /* ---------- Serviços ---------- */
      const addServico = () =>
        setServicos((s) => [...s, { id: uid(), nome: "", unidade: "m²", quantidade: "", rendimento: "", complexidade: "Média" }]);
      const rmServico = (id) => setServicos((s) => s.filter((x) => x.id !== id));
      const upServico = (id, patch) =>
        setServicos((s) => s.map((x) => (x.id === id ? { ...x, ...patch } : x)));

      /* ---------- Cálculo principal ---------- */
      const calc = useMemo(() => {
        const itens = servicos.map((s) => {
          const { dias, rendEfetivo } = diasDoItem(s);
          return { ...s, dias, rendEfetivo };
        });
        const diasBrutos = itens.reduce((a, b) => a + b.dias, 0);
        const totalDias = Math.max(0, Math.ceil(diasBrutos));

        const ganhoDia = toNum(prof.ganhoDia);
        const deslocamentoDia = toNum(prof.deslocamentoDia);
        const custoAjudanteDia = prof.possuiAjudante ? toNum(prof.custoAjudanteDia) : 0;
        const margem = toNum(prof.margem);

        const maoDeObra = totalDias * ganhoDia;
        const deslocamento = totalDias * deslocamentoDia;
        const ajudante = totalDias * custoAjudanteDia;
        const custosOperacionais = deslocamento + ajudante;
        const baseCusto = maoDeObra + custosOperacionais;        // preço mínimo (break-even na sua meta/dia)
        const reservaRisco = baseCusto * (margem / 100);          // margem / reserva de risco
        const precoMinimo = baseCusto;
        const precoRecomendado = baseCusto + reservaRisco;
        const precoPremium = precoRecomendado * 1.15;

        // Rateia o preço recomendado entre os serviços, proporcional aos dias de cada um.
        // Assim cada serviço ganha um preço total e um preço por unidade (m²/m/un).
        const itensOrcados = itens.map((it) => {
          const precoServico = diasBrutos > 0 ? precoRecomendado * (it.dias / diasBrutos) : 0;
          const qtd = toNum(it.quantidade);
          const precoUnit = qtd > 0 ? precoServico / qtd : 0;
          return { ...it, precoServico, precoUnit };
        });

        const diasSemana = Math.max(1, toNum(prof.diasSemana) || 5);
        const semanas = totalDias / diasSemana;

        // Ganho REAL por dia para um preço P = (preço - custos operacionais) / dias
        const ganhoRealPorDia = (P) => totalDias > 0 ? (P - custosOperacionais) / totalDias : 0;

        return {
          itens: itensOrcados, diasBrutos, totalDias, semanas,
          maoDeObra, deslocamento, ajudante, custosOperacionais, baseCusto, reservaRisco,
          precoMinimo, precoRecomendado, precoPremium,
          ganhoDia, margem, ganhoRealPorDia,
        };
      }, [servicos, prof]);

      /* ---------- Aditivos ---------- */
      const custoDiaMarginal = useMemo(() =>
        toNum(prof.ganhoDia) + toNum(prof.deslocamentoDia) + (prof.possuiAjudante ? toNum(prof.custoAjudanteDia) : 0),
        [prof]);

      function valorAditivo(a) {
        if (a.valorManual !== "" && a.valorManual != null) return toNum(a.valorManual);
        const { dias } = diasDoItem(a);
        return dias * custoDiaMarginal * (1 + toNum(prof.margem) / 100);
      }

      const addAditivo = (tipo) =>
        setAditivos((a) => [...a, { id: uid(), tipo, nome: "", unidade: "m²", quantidade: "", rendimento: "", complexidade: "Média", valorManual: "" }]);
      const rmAditivo = (id) => setAditivos((a) => a.filter((x) => x.id !== id));
      const upAditivo = (id, patch) =>
        setAditivos((a) => a.map((x) => (x.id === id ? { ...x, ...patch } : x)));

      const contratoBase = contratoOriginal === "" ? calc.precoRecomendado : toNum(contratoOriginal);
      const totAdicionais = aditivos.filter((a) => a.tipo === "adicional").reduce((s, a) => s + valorAditivo(a), 0);
      const totNaoExec = aditivos.filter((a) => a.tipo === "naoExecutado").reduce((s, a) => s + valorAditivo(a), 0);
      const valorAtualizado = contratoBase + totAdicionais - totNaoExec;

      /* Simulador reverso */
      const precoSimulado = simuladorPreco === "" ? calc.precoRecomendado : toNum(simuladorPreco);
      const ganhoSimulado = calc.ganhoRealPorDia(precoSimulado);
      const ganhoRecomendado = calc.ganhoRealPorDia(calc.precoRecomendado);

      const resetTudo = () => {
        if (confirm("Limpar tudo e recomeçar?")) {
          localStorage.removeItem("orcajusto_v2");
          setProf(ESTADO_INICIAL.prof);
          setServicos(ESTADO_INICIAL.servicos.map((s) => ({ ...s, id: uid() })));
          setAditivos([]); setContratoOriginal(""); setSimuladorPreco("");
        }
      };

      const hoje = new Date().toLocaleDateString("pt-BR");

      /* ===================== RENDER ===================== */
      return (
        <div className="max-w-2xl mx-auto px-4 pb-24 pt-6">

          {/* Cabeçalho */}
          <header className="mb-5">
            <div className="flex items-center gap-2">
              <div className="h-9 w-9 rounded-xl bg-indigo-600 text-white grid place-items-center font-bold">OJ</div>
              <div>
                <h1 className="text-xl font-bold leading-tight">Orça Justo</h1>
                <p className="text-xs text-slate-500">Quanto cobrar pra não trabalhar meses e ganhar menos do que imaginava.</p>
              </div>
            </div>
            <p className="print-only text-sm text-slate-500 mt-2">Orçamento gerado em {hoje}</p>
          </header>

          {/* ---------- PASSO 1 ---------- */}
          <section className="no-print bg-white rounded-2xl shadow-sm p-5 mb-4">
            <h2 className="text-sm font-bold text-indigo-600 uppercase tracking-wide mb-3">1 · Seus dados</h2>
            <div className="grid grid-cols-2 gap-3">
              <Campo label="Quanto quer ganhar por dia?">
                <NumInput value={prof.ganhoDia} onChange={(v) => setP("ganhoDia", v)} prefix="R$" />
              </Campo>
              <Campo label="Dias por semana">
                <NumInput value={prof.diasSemana} onChange={(v) => setP("diasSemana", v)} suffix="dias" />
              </Campo>
              <Campo label="Deslocamento por dia">
                <NumInput value={prof.deslocamentoDia} onChange={(v) => setP("deslocamentoDia", v)} prefix="R$" />
              </Campo>
              <Campo label="Margem / reserva">
                <NumInput value={prof.margem} onChange={(v) => setP("margem", v)} suffix="%" />
              </Campo>
              <div className="col-span-2">
                <label className="flex items-center gap-2 select-none">
                  <input type="checkbox" checked={prof.possuiAjudante}
                    onChange={(e) => setP("possuiAjudante", e.target.checked)}
                    className="h-5 w-5 rounded border-slate-300 text-indigo-600" />
                  <span className="text-sm font-medium text-slate-700">Tenho ajudante</span>
                </label>
              </div>
              {prof.possuiAjudante && (
                <Campo label="Custo do ajudante por dia">
                  <NumInput value={prof.custoAjudanteDia} onChange={(v) => setP("custoAjudanteDia", v)} prefix="R$" />
                </Campo>
              )}
            </div>
          </section>

          {/* ---------- PASSO 2 ---------- */}
          <section className="no-print bg-white rounded-2xl shadow-sm p-5 mb-4">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-sm font-bold text-indigo-600 uppercase tracking-wide">2 · Serviços</h2>
              <span className="text-xs text-slate-400">{calc.totalDias} dias úteis estimados</span>
            </div>

            <div className="text-xs text-slate-500 leading-relaxed mb-3 -mt-1 rounded-lg bg-slate-50 border border-slate-100 p-3">
              <p className="mb-1.5">
                A <span className="font-semibold text-slate-600">complexidade</span> muda o quanto você rende por dia.
                Isso altera o <span className="font-medium">número de dias</span> da obra — e, como o preço é por dia
                trabalhado, mexe direto no <span className="font-medium">valor final</span>:
              </p>
              <ul className="space-y-1">
                <li>
                  <span className="font-semibold text-emerald-700">Baixa</span> — simples e repetitivo: rende ~15% a mais,
                  então leva <b>~13% menos dias</b> → preço menor.
                </li>
                <li>
                  <span className="font-semibold text-slate-600">Média</span> — condições normais: usa o rendimento
                  padrão, sem ajuste.
                </li>
                <li>
                  <span className="font-semibold text-red-600">Alta</span> — acabamento fino, difícil acesso, muitos
                  recortes ou risco de retrabalho: rende ~20% a menos, então leva <b>~25% mais dias</b> → preço maior.
                </li>
              </ul>
            </div>

            <div className="space-y-3">
              {servicos.map((s) => {
                const info = calc.itens.find((i) => i.id === s.id) || { dias: 0 };
                return (
                  <div key={s.id} className="rounded-xl border border-slate-200 p-3">
                    <div className="flex gap-2 items-start">
                      <input value={s.nome} placeholder="Nome do serviço"
                        onChange={(e) => upServico(s.id, { nome: e.target.value })}
                        className={inputCls + " flex-1"} />
                      <button onClick={() => rmServico(s.id)} aria-label="Remover"
                        className="text-slate-400 hover:text-red-500 px-2 py-2 text-xl leading-none">×</button>
                    </div>
                    <div className="grid grid-cols-3 gap-2 mt-2">
                      <Campo label="Qtd.">
                        <NumInput value={s.quantidade} onChange={(v) => upServico(s.id, { quantidade: v })} />
                      </Campo>
                      <Campo label="Unidade">
                        <select value={s.unidade} onChange={(e) => upServico(s.id, { unidade: e.target.value })} className={inputCls}>
                          {UNIDADES.map((u) => <option key={u} value={u}>{u}</option>)}
                        </select>
                      </Campo>
                      <Campo label="Complexidade">
                        <select value={s.complexidade} onChange={(e) => upServico(s.id, { complexidade: e.target.value })} className={inputCls}>
                          {COMPLEXIDADES.map((c) => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </Campo>
                    </div>
                    <div className="flex items-center justify-between mt-2 gap-2">
                      <Campo label="Rende por dia" hint="quanto você faz por dia">
                        <NumInput value={s.rendimento}
                          onChange={(v) => upServico(s.id, { rendimento: v })} suffix={s.unidade + "/d"} />
                      </Campo>
                      <div className="text-right shrink-0">
                        <div className="text-xs text-slate-400">tempo</div>
                        <div className="font-semibold text-slate-700">{dec(info.dias, 1)} dias</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <button onClick={addServico}
              className="mt-3 w-full rounded-xl border-2 border-dashed border-indigo-300 text-indigo-600 font-medium py-2.5 hover:bg-indigo-50">
              + Adicionar serviço
            </button>
          </section>

          {/* ---------- PASSO 4 · RESULTADO ---------- */}
          <section className="bg-white rounded-2xl shadow-sm p-5 mb-4 print-area">
            <h2 className="text-sm font-bold text-emerald-600 uppercase tracking-wide mb-1">Resultado do orçamento</h2>
            <p className="text-xs text-slate-400 mb-4">
              {calc.totalDias} dias úteis (≈ {dec(calc.semanas, 1)} semanas a {dec(toNum(prof.diasSemana),0)} dias/semana)
            </p>

            {/* Três preços */}
            <div className="grid grid-cols-3 gap-2 mb-4">
              <div className="rounded-xl bg-slate-50 p-3 text-center">
                <div className="text-[11px] uppercase text-slate-400 font-semibold">Mínimo</div>
                <div className="font-bold text-slate-700 mt-1 leading-tight">{brl(calc.precoMinimo)}</div>
              </div>
              <div className="rounded-xl bg-emerald-600 text-white p-3 text-center ring-2 ring-emerald-300">
                <div className="text-[11px] uppercase opacity-90 font-semibold">Recomendado</div>
                <div className="font-bold mt-1 leading-tight text-lg">{brl(calc.precoRecomendado)}</div>
              </div>
              <div className="rounded-xl bg-slate-50 p-3 text-center">
                <div className="text-[11px] uppercase text-slate-400 font-semibold">Premium</div>
                <div className="font-bold text-slate-700 mt-1 leading-tight">{brl(calc.precoPremium)}</div>
              </div>
            </div>

            {/* Itens do orçamento: descrição, quantidade, preço por unidade e total */}
            <div className="mb-4">
              <h3 className="text-sm font-semibold text-slate-600 mb-2">Serviços orçados</h3>
              <div className="rounded-xl border border-slate-100 overflow-hidden">
                {calc.itens.filter((it) => toNum(it.quantidade) > 0).map((it) => (
                  <div key={it.id} className="flex items-baseline justify-between gap-3 px-3 py-2 border-b border-slate-100 last:border-0">
                    <div className="min-w-0">
                      <div className="font-medium text-slate-700 truncate">{it.nome || "Serviço sem nome"}</div>
                      <div className="text-xs text-slate-400">
                        {dec(toNum(it.quantidade), 2)} {it.unidade} × {brl(it.precoUnit)}/{it.unidade}
                      </div>
                    </div>
                    <div className="tabular-nums font-semibold text-slate-700 shrink-0">{brl(it.precoServico)}</div>
                  </div>
                ))}
                {calc.itens.filter((it) => toNum(it.quantidade) > 0).length === 0 && (
                  <div className="px-3 py-3 text-sm text-slate-400 text-center">
                    Preencha serviços com quantidade para ver o detalhamento.
                  </div>
                )}
              </div>
              <div className="flex items-baseline justify-between gap-3 px-3 pt-2">
                <span className="font-semibold text-slate-600">Total dos serviços</span>
                <span className="tabular-nums font-bold text-slate-800">{brl(calc.precoRecomendado)}</span>
              </div>
            </div>

            {/* DIFERENCIAL: ganho real por dia */}
            <div className="rounded-xl bg-indigo-50 border border-indigo-100 p-4 mb-4">
              <p className="text-slate-700">
                Cobrando <b>{brl(calc.precoRecomendado)}</b>, você recebe aproximadamente{" "}
                <b className="text-indigo-700">{brl(ganhoRecomendado)}</b> por dia de trabalho.
              </p>
              <p className="text-xs text-slate-500 mt-1">
                (sua meta era {brl(calc.ganhoDia)}/dia — a diferença é a sua margem de {dec(calc.margem,0)}%)
              </p>
            </div>

            {/* Como chegamos nesse valor */}
            <details className="mb-2" open>
              <summary className="cursor-pointer text-sm font-semibold text-slate-600 select-none">Como chegamos nesse valor</summary>
              <div className="mt-2">
                <LinhaResumo titulo="Mão de obra" sub={calc.totalDias + " dias × " + brl(calc.ganhoDia)} valor={brl(calc.maoDeObra)} />
                <LinhaResumo titulo="Deslocamento" sub={calc.totalDias + " dias × " + brl(toNum(prof.deslocamentoDia))} valor={brl(calc.deslocamento)} />
                {prof.possuiAjudante &&
                  <LinhaResumo titulo="Ajudante" sub={calc.totalDias + " dias × " + brl(toNum(prof.custoAjudanteDia))} valor={brl(calc.ajudante)} />}
                <LinhaResumo titulo={"Reserva de risco / margem (" + dec(calc.margem,0) + "%)"} valor={brl(calc.reservaRisco)} />
                <div className="border-t-2 border-slate-200 mt-1 pt-1">
                  <LinhaResumo titulo="Preço recomendado" valor={brl(calc.precoRecomendado)} destaque />
                </div>
              </div>
            </details>
          </section>

          {/* ---------- SIMULADOR REVERSO ---------- */}
          <section className="no-print bg-white rounded-2xl shadow-sm p-5 mb-4">
            <h2 className="text-sm font-bold text-amber-600 uppercase tracking-wide mb-3">E se eu cobrar outro valor?</h2>
            <Campo label="Simular um preço de obra">
              <NumInput value={simuladorPreco} placeholder={String(Math.round(calc.precoRecomendado))}
                onChange={setSimuladorPreco} prefix="R$" />
            </Campo>
            <div className={"mt-3 rounded-xl p-4 " + (ganhoSimulado >= calc.ganhoDia ? "bg-emerald-50 border border-emerald-100" : "bg-red-50 border border-red-100")}>
              <p className="text-slate-700">
                Cobrando <b>{brl(precoSimulado)}</b>, sua remuneração fica em{" "}
                <b className={ganhoSimulado >= calc.ganhoDia ? "text-emerald-700" : "text-red-600"}>{brl(ganhoSimulado)}</b> por dia.
              </p>
              <p className="text-xs text-slate-500 mt-1">
                {ganhoSimulado >= calc.ganhoDia
                  ? "✓ Acima da sua meta de " + brl(calc.ganhoDia) + "/dia."
                  : "⚠ Abaixo da sua meta de " + brl(calc.ganhoDia) + "/dia. Você estaria se subprecificando."}
              </p>
            </div>
          </section>

          {/* Toggle: a seção de aditivos só aparece quando marcada (igual ao ajudante) */}
          <label className="no-print flex items-center gap-2 select-none bg-white rounded-2xl shadow-sm p-5 mb-4 cursor-pointer">
            <input type="checkbox" checked={mostrarAditivos}
              onChange={(e) => setMostrarAditivos(e.target.checked)}
              className="h-5 w-5 rounded border-slate-300 text-purple-600" />
            <span className="text-sm font-medium text-slate-700">
              Esta obra teve aditivos <span className="font-normal text-slate-400">(serviços extras ou não executados)</span>
            </span>
          </label>

          {/* ---------- MÓDULO DE ADITIVOS ---------- */}
          {mostrarAditivos && (
          <section className="bg-white rounded-2xl shadow-sm p-5 mb-4 print-area">
            <h2 className="text-sm font-bold text-purple-600 uppercase tracking-wide mb-3">Aditivos da obra</h2>

            <Campo label="Valor do contrato original" hint="vazio = usa o preço recomendado acima">
              <NumInput value={contratoOriginal} placeholder={String(Math.round(calc.precoRecomendado))}
                onChange={setContratoOriginal} prefix="R$" />
            </Campo>

            {aditivos.length > 0 && (
              <div className="space-y-3 mt-4 no-print">
                {aditivos.map((a) => (
                  <div key={a.id} className={"rounded-xl border p-3 " + (a.tipo === "adicional" ? "border-emerald-200 bg-emerald-50/40" : "border-red-200 bg-red-50/40")}>
                    <div className="flex gap-2 items-center mb-2">
                      <span className={"text-xs font-bold px-2 py-0.5 rounded-full " + (a.tipo === "adicional" ? "bg-emerald-600 text-white" : "bg-red-500 text-white")}>
                        {a.tipo === "adicional" ? "+ Adicional" : "− Não executado"}
                      </span>
                      <input value={a.nome} placeholder="Serviço"
                        onChange={(e) => upAditivo(a.id, { nome: e.target.value })} className={inputCls + " flex-1"} />
                      <button onClick={() => rmAditivo(a.id)} className="text-slate-400 hover:text-red-500 px-1 text-xl leading-none">×</button>
                    </div>
                    <div className="grid grid-cols-4 gap-2">
                      <Campo label="Qtd."><NumInput value={a.quantidade} onChange={(v) => upAditivo(a.id, { quantidade: v })} /></Campo>
                      <Campo label="Unid.">
                        <select value={a.unidade} onChange={(e) => upAditivo(a.id, { unidade: e.target.value })} className={inputCls}>
                          {UNIDADES.map((u) => <option key={u} value={u}>{u}</option>)}
                        </select>
                      </Campo>
                      <Campo label="Compl.">
                        <select value={a.complexidade} onChange={(e) => upAditivo(a.id, { complexidade: e.target.value })} className={inputCls}>
                          {COMPLEXIDADES.map((c) => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </Campo>
                      <Campo label="Valor fixo" hint="opcional">
                        <NumInput value={a.valorManual} placeholder="auto" onChange={(v) => upAditivo(a.id, { valorManual: v })} prefix="R$" />
                      </Campo>
                    </div>
                    <div className="text-right text-sm mt-1 font-semibold text-slate-600">
                      {a.tipo === "adicional" ? "+ " : "− "}{brl(valorAditivo(a))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div className="flex gap-2 mt-4 no-print">
              <button onClick={() => addAditivo("adicional")}
                className="flex-1 rounded-xl border-2 border-dashed border-emerald-300 text-emerald-700 font-medium py-2 hover:bg-emerald-50">
                + Serviço adicional
              </button>
              <button onClick={() => addAditivo("naoExecutado")}
                className="flex-1 rounded-xl border-2 border-dashed border-red-300 text-red-600 font-medium py-2 hover:bg-red-50">
                − Não executado
              </button>
            </div>

            {/* Relatório (aparece também no PDF) */}
            <div className="mt-4 border-t border-slate-200 pt-3">
              <LinhaResumo titulo="Contrato original" valor={brl(contratoBase)} />
              {aditivos.filter(a => a.tipo === "adicional").map(a =>
                <LinhaResumo key={a.id} titulo={"+ " + (a.nome || "Adicional")} sub={a.quantidade ? a.quantidade + " " + a.unidade : ""} valor={"+ " + brl(valorAditivo(a))} />)}
              {aditivos.filter(a => a.tipo === "naoExecutado").map(a =>
                <LinhaResumo key={a.id} titulo={"− " + (a.nome || "Não executado")} sub={a.quantidade ? a.quantidade + " " + a.unidade : ""} valor={"− " + brl(valorAditivo(a))} />)}
              <div className="border-t-2 border-slate-200 mt-1 pt-1">
                <LinhaResumo titulo="Valor atualizado da obra" valor={brl(valorAtualizado)} destaque />
              </div>
            </div>
          </section>
          )}

          {/* Rodapé / ações */}
          <div className="no-print flex gap-2">
            <button onClick={() => window.print()}
              className="flex-1 rounded-xl bg-indigo-600 text-white font-semibold py-3 hover:bg-indigo-700 shadow-sm">
              Salvar / imprimir PDF
            </button>
            <button onClick={resetTudo}
              className="rounded-xl bg-white border border-slate-300 text-slate-500 font-medium px-4 hover:bg-slate-50">
              Limpar
            </button>
          </div>
          <p className="no-print text-center text-xs text-slate-400 mt-4">
            Os dados ficam salvos só neste aparelho. MVP — Orça Justo.
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- BOOTSTRAP: transforma o JSX com runtime clássico e mostra erros na tela -->
  <script>
    (function () {
      function showError(msg) {
        var root = document.getElementById("root");
        if (root) {
          root.innerHTML =
            '<div style="max-width:640px;margin:24px auto;padding:16px;border:1px solid #fecaca;' +
            'background:#fef2f2;border-radius:12px;font-family:system-ui,sans-serif">' +
            '<strong style="color:#b91c1c">Ops — erro ao carregar o app.</strong>' +
            '<pre style="white-space:pre-wrap;color:#7f1d1d;font-size:12px;margin-top:8px">' +
            String(msg).replace(/&/g, "&amp;").replace(/</g, "&lt;") + "</pre></div>";
        }
        if (window.console) console.error(msg);
      }
      window.addEventListener("error", function (e) {
        var root = document.getElementById("root");
        if (root && !root.firstChild) showError(e.message || e.error || e);
      });
      function boot() {
        try {
          if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
            return showError("React não carregou (verifique a conexão e recarregue a página).");
          }
          if (typeof Babel === "undefined") {
            return showError("Babel não carregou (verifique a conexão e recarregue a página).");
          }
          var src = document.getElementById("app-src").textContent;
          var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
          (0, eval)(out);
        } catch (err) {
          showError((err && err.message) ? err.message : err);
        }
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
